<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arun Ganapathy — ChatGPT Hope Portfolio</title>
  <meta name="description" content="A ChatGPT-built JobHunt with Hope portfolio route for Arun Ganapathy." />
  <meta property="og:type" content="profile" />
  <meta property="og:title" content="Arun Ganapathy — ChatGPT Hope Portfolio" />
  <meta property="og:description" content="AI engineering lead, founder, and NSF-funded researcher — published with JobHunt with Hope." />
  <meta property="og:url" content="https://oneconsciousness.github.io/chatgpt/" />
  <meta property="og:image" content="https://oneconsciousness.github.io/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Arun Ganapathy — ChatGPT Hope Portfolio" />
  <meta name="twitter:description" content="AI engineering lead, founder, and NSF-funded researcher — published with JobHunt with Hope." />
  <meta name="twitter:image" content="https://oneconsciousness.github.io/og-image.png" />
  <style>
    html, body { margin: 0; min-height: 100%; background: #F0EBE3; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .hope-loading { min-height: 100vh; display: grid; place-items: center; color: #5C4F3D; padding: 24px; text-align: center; }
    .hope-loading strong { color: #1A1612; }
  </style>
  <script>
    (async function bootHopeRoute() {
      try {
        const response = await fetch('../index.html', { cache: 'no-store' });
        if (!response.ok) throw new Error('Could not load Hope portfolio shell.');
        let html = await response.text();

        html = html
          .replace('<head>', '<head>\n<base href="../">')
          .replace(/<title>.*?<\/title>/, '<title>Arun Ganapathy — ChatGPT Hope Portfolio</title>')
          .replace(/<meta name="hope:share-url" content="[^"]*" \/>/, '<meta name="hope:share-url" content="https://oneconsciousness.github.io/chatgpt/" />')
          .replace(/<meta property="og:url" content="[^"]*" \/>/, '<meta property="og:url" content="https://oneconsciousness.github.io/chatgpt/" />')
          .replace(/<meta property="og:title" content="[^"]*" \/>/, '<meta property="og:title" content="Arun Ganapathy — ChatGPT Hope Portfolio" />')
          .replace(/<meta name="twitter:title" content="[^"]*" \/>/, '<meta name="twitter:title" content="Arun Ganapathy — ChatGPT Hope Portfolio" />')
          .replace('Arun Ganapathy — Portfolio', 'Arun Ganapathy — ChatGPT Hope Portfolio');

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<main class="hope-loading"><p><strong>Hope route could not load.</strong><br>Open the root portfolio at <a href="../">oneconsciousness.github.io</a>.</p></main>';
        console.error(error);
      }
    })();
  </script>
</head>
<body>
  <main class="hope-loading">
    <p><strong>Loading the Hope portfolio…</strong><br />Keeping this route visually matched to the live Hope build.</p>
  </main>
</body>
</html>
