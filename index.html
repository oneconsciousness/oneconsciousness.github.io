<!-- EXPORT CHOOSER (modal) ========================================= -->
<!-- Opened by #pdf-btn. THIS RELEASE it is the "Save résumé as PDF" dialog:
     picks resume style + font + fit, sets body.print-doc-resume.print-style-
     <style>, applies --resume-font (and floor-aware auto-fit --rfs when
     chosen) on #resume-view, closes, calls window.print(). Last choice
     persists in localStorage ('hope-resume-pref').
     PORTFOLIO PDF — gated for the next release; re-enable by restoring the
     Document fieldset (and the portfolio Style + Layout fieldsets that hung
     off it). The print engine — continuous-mode JS, portfolio print styles,
     print TOC, body-class plumbing — is kept intact; only this UI entry
     point is gone. The default no-class browser print (Cmd+P) still prints
     the paginated classic portfolio. -->
<div id="export-modal" hidden role="dialog" aria-modal="true" aria-labelledby="export-modal-title">
  <div class="export-backdrop" data-export-close></div>
  <div class="export-dialog">
    <div class="export-head">
      <h2 id="export-modal-title">Save résumé as PDF</h2>
      <button class="export-x" type="button" aria-label="Close" data-export-close>&times;</button>
    </div>
    <fieldset class="export-group" id="export-styles-resume">
      <legend class="export-group-label">Style</legend>
      <div class="export-opts">
        <label class="export-opt">
          <input type="radio" name="export-style-resume" value="classic" checked />
          <span class="opt-name">Classic<span class="opt-tag">Recommended</span></span>
          <span class="opt-desc">Timeless serif résumé — black on white, single column.</span>
        </label>
        <label class="export-opt">
          <input type="radio" name="export-style-resume" value="modern" />
          <span class="opt-name">Modern</span>
          <span class="opt-desc">Clean Inter sans-serif with one restrained orange accent.</span>
        </label>
        <label class="export-opt">
          <input type="radio" name="export-style-resume" value="compact" />
          <span class="opt-name">Compact</span>
          <span class="opt-desc">Dense — fits more per page, never below the readability floor.</span>
        </label>
      </div>
    </fieldset>
    <!-- Per-style default pre-selected by JS (classic → Georgia,
         modern/compact → Inter). Picking one overrides the résumé family via
         --resume-font on #resume-view. All ATS-safe system stacks. -->
    <fieldset class="export-group" id="export-font-resume">
      <legend class="export-group-label">Font</legend>
      <div class="export-opts">
        <label class="export-opt">
          <input type="radio" name="export-font-resume" value="georgia" checked />
          <span class="opt-name">Georgia (serif)</span>
        </label>
        <label class="export-opt">
          <input type="radio" name="export-font-resume" value="times" />
          <span class="opt-name">Times New Roman (serif)</span>
        </label>
        <label class="export-opt">
          <input type="radio" name="export-font-resume" value="inter" />
          <span class="opt-name">Inter (sans)</span>
        </label>
      </div>
    </fieldset>
    <fieldset class="export-group" id="export-fit-resume">
      <legend class="export-group-label">Fit</legend>
      <div class="export-opts export-opts-2">
        <label class="export-opt">
          <input type="radio" name="export-fit-resume" value="comfortable" checked />
          <span class="opt-name">Comfortable<span class="opt-tag">Recommended</span></span>
          <span class="opt-desc">Standard sizing.</span>
        </label>
        <label class="export-opt">
          <input type="radio" name="export-fit-resume" value="auto" />
          <span class="opt-name">Auto-fit</span>
          <span class="opt-desc">Tighten to fit fewer pages, never below the readability floor.</span>
        </label>
      </div>
    </fieldset>
    <div class="export-actions">
      <button class="export-cancel" type="button" data-export-close>Cancel</button>
      <button id="export-confirm" class="export-confirm" type="button">Save as PDF</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
